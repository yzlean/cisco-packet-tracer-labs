<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>HQ Corporate Intranet Portal</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #1e1e24;
            color: #fff;
            text-align: center;
            padding: 50px;
        }
        .server-card {
            background: #2a2a35;
            border-radius: 8px;
            padding: 30px;
            max-width: 500px;
            margin: 0 auto;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            border: 2px solid #4a90e2;
        }
        h1 { color: #4a90e2; margin-bottom: 5px; }
        .status { color: #2ecc71; font-weight: bold; }
    </style>
</head>
<body>
    <div class="server-card">
        <h1>COMPANY-SERVER</h1>
        <p>Local Subnet Address: <strong>192.168.1.10</strong></p>
        <p>Gateway Routing Path: <strong>192.168.1.1</strong></p>
        <hr style="border-color: #444;">
        <p>System Status: <span class="status">ONLINE // SECURE</span></p>
    </div>
</body>
</html>
